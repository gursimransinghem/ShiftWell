<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    ShiftWell Icon Tournament — Lane 2: Chronotype Spiral
    24-hour circadian clock. Arc thickness encodes the Two-Process Model:
      Outer ring: 24 segments (one per hour). Wake arcs thick & bright.
                  Sleep arcs thin & deep-purple. Clock-face orientation,
                  not spiral — midnight at top, noon at bottom.
      Middle ring: Process S (homeostatic sleep pressure) — thicker on
                   the left/evening half where pressure peaks.
      Inner spines: 12 radial marks. Length scales with circadian alertness.
      Core node: gold disk — the biological clock anchor point.
    No fibonacci snails. No lorem-ipsum circles. Pure Two-Process geometry.
  -->
  <defs>
    <!-- Subtle ambient glow for the wake-arc bloom -->
    <filter id="wakeGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Softer glow for the noon spine marker -->
    <filter id="softGlow" x="-60%" y="-20%" width="220%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Core ambient radial gradient -->
    <radialGradient id="ambientCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#C8A84B" stop-opacity="0.18"/>
      <stop offset="45%"  stop-color="#7B61FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#080B14" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold core gradient -->
    <radialGradient id="goldCore" cx="38%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#F5D98C"/>
      <stop offset="40%"  stop-color="#C8A84B"/>
      <stop offset="100%" stop-color="#8A6A1A"/>
    </radialGradient>
  </defs>

  <!-- ─── BACKGROUND ─── -->
  <rect width="1024" height="1024" fill="#080B14"/>

  <!-- ─── AMBIENT CORE GLOW ─── -->
  <circle cx="512" cy="512" r="280" fill="url(#ambientCore)"/>

  <!-- ─────────────────────────────────────────────────────────────
       OUTER RING — 24 arc segments (r=320, band ±24px)
       One segment per hour. 15° per hour, 2° gap each side → 11° sweep.
       Orientation: 0°=top=midnight, 90°=right=6am, 180°=bottom=noon.
       Thickness encodes circadian drive (Process C in Two-Process Model):
         Sleep nadir (H03): 12px — most compressed
         Peak alert  (H09/10): 48px — most expanded
         Gold peak   (H17/18): 44px — warm-gold afternoon phase
       ───────────────────────────────────────────────────────────── -->

  <!-- H00 midnight  → SLEEP  --> <path d="M 523.2,192.2 A 320 320 0 0 1 584.0,200.2" fill="none" stroke="#231665" stroke-width="16" stroke-linecap="butt" opacity="0.82"/>
  <!-- H01 1am       → SLEEP  --> <path d="M 605.6,206.0 A 320 320 0 0 1 662.2,229.5" fill="none" stroke="#1E1258" stroke-width="16" stroke-linecap="butt" opacity="0.80"/>
  <!-- H02 2am       → SLEEP  --> <path d="M 681.6,240.6 A 320 320 0 0 1 730.2,278.0" fill="none" stroke="#1A0F4E" stroke-width="14" stroke-linecap="butt" opacity="0.78"/>
  <!-- H03 3am nadir → SLEEP  --> <path d="M 746.0,293.8 A 320 320 0 0 1 783.4,342.4" fill="none" stroke="#160C42" stroke-width="12" stroke-linecap="butt" opacity="0.75"/>
  <!-- H04 4am       → SLEEP  --> <path d="M 794.5,361.8 A 320 320 0 0 1 818.0,418.4" fill="none" stroke="#1A0F4E" stroke-width="14" stroke-linecap="butt" opacity="0.78"/>
  <!-- H05 5am       → SLEEP  --> <path d="M 823.8,440.0 A 320 320 0 0 1 831.8,500.8" fill="none" stroke="#231665" stroke-width="16" stroke-linecap="butt" opacity="0.82"/>
  <!-- H06 6am dawn  → TRANS  --> <path d="M 831.8,523.2 A 320 320 0 0 1 823.8,584.0" fill="none" stroke="#3D2A95" stroke-width="28" stroke-linecap="butt" opacity="0.90"/>
  <!-- H07 7am       → WAKE   --> <path d="M 818.0,605.6 A 320 320 0 0 1 794.5,662.2" fill="none" stroke="#4E39B8" stroke-width="36" stroke-linecap="butt" opacity="0.93"/>
  <!-- H08 8am       → WAKE   --> <path d="M 783.4,681.6 A 320 320 0 0 1 746.0,730.2" fill="none" stroke="#6248CC" stroke-width="42" stroke-linecap="butt" opacity="0.96"/>
  <!-- H09 9am peak  → WAKE   --> <path d="M 730.2,746.0 A 320 320 0 0 1 681.6,783.4" fill="none" stroke="#7B61FF" stroke-width="48" stroke-linecap="butt" opacity="1.0" filter="url(#wakeGlow)"/>
  <!-- H10 10am peak → WAKE   --> <path d="M 662.2,794.5 A 320 320 0 0 1 605.6,818.0" fill="none" stroke="#7B61FF" stroke-width="48" stroke-linecap="butt" opacity="1.0" filter="url(#wakeGlow)"/>
  <!-- H11 11am      → WAKE   --> <path d="M 584.0,823.8 A 320 320 0 0 1 523.2,831.8" fill="none" stroke="#8B6EF0" stroke-width="46" stroke-linecap="butt" opacity="0.98"/>
  <!-- H12 noon      → WAKE   --> <path d="M 500.8,831.8 A 320 320 0 0 1 440.0,823.8" fill="none" stroke="#9B7ADE" stroke-width="44" stroke-linecap="butt" opacity="0.97"/>
  <!-- H13 1pm       → WAKE   --> <path d="M 418.4,818.0 A 320 320 0 0 1 361.8,794.5" fill="none" stroke="#A885C8" stroke-width="44" stroke-linecap="butt" opacity="0.96"/>
  <!-- H14 2pm dip   → WAKE   --> <path d="M 342.4,783.4 A 320 320 0 0 1 293.8,746.0" fill="none" stroke="#B590A8" stroke-width="42" stroke-linecap="butt" opacity="0.95"/>
  <!-- H15 3pm       → WAKE   --> <path d="M 278.0,730.2 A 320 320 0 0 1 240.6,681.6" fill="none" stroke="#BE9A88" stroke-width="40" stroke-linecap="butt" opacity="0.94"/>
  <!-- H16 4pm       → WAKE   --> <path d="M 229.5,662.2 A 320 320 0 0 1 206.0,605.6" fill="none" stroke="#C4A268" stroke-width="42" stroke-linecap="butt" opacity="0.95"/>
  <!-- H17 5pm gold  → WAKE   --> <path d="M 200.2,584.0 A 320 320 0 0 1 192.2,523.2" fill="none" stroke="#C8A84B" stroke-width="44" stroke-linecap="butt" opacity="0.98" filter="url(#wakeGlow)"/>
  <!-- H18 6pm gold  → WAKE   --> <path d="M 192.2,500.8 A 320 320 0 0 1 200.2,440.0" fill="none" stroke="#C8A84B" stroke-width="44" stroke-linecap="butt" opacity="0.98" filter="url(#wakeGlow)"/>
  <!-- H19 7pm       → WAKE   --> <path d="M 206.0,418.4 A 320 320 0 0 1 229.5,361.8" fill="none" stroke="#B898A0" stroke-width="40" stroke-linecap="butt" opacity="0.95"/>
  <!-- H20 8pm       → WAKE   --> <path d="M 240.6,342.4 A 320 320 0 0 1 278.0,293.8" fill="none" stroke="#8B6ECC" stroke-width="34" stroke-linecap="butt" opacity="0.92"/>
  <!-- H21 9pm dusk  → TRANS  --> <path d="M 293.8,278.0 A 320 320 0 0 1 342.4,240.6" fill="none" stroke="#4A32A0" stroke-width="24" stroke-linecap="butt" opacity="0.88"/>
  <!-- H22 10pm      → SLEEP  --> <path d="M 361.8,229.5 A 320 320 0 0 1 418.4,206.0" fill="none" stroke="#2D1E78" stroke-width="18" stroke-linecap="butt" opacity="0.85"/>
  <!-- H23 11pm      → SLEEP  --> <path d="M 440.0,200.2 A 320 320 0 0 1 500.8,192.2" fill="none" stroke="#271868" stroke-width="17" stroke-linecap="butt" opacity="0.83"/>

  <!-- ─────────────────────────────────────────────────────────────
       MIDDLE RING — Process S (homeostatic sleep pressure), r=230
       Six arc bands. Left hemisphere (270°-360°-120°) = sleep zone,
       low pressure. Right hemisphere (120°-270°) = wake, pressure builds.
       Evening left arc (210°-268°) peaks in gold = max sleep pressure.
       ───────────────────────────────────────────────────────────── -->

  <!-- Sleep zone (0-58°): thin, very muted -->
  <path d="M 520.0,282.1 A 230 230 0 0 1 702.7,383.4" fill="none" stroke="#1E1254" stroke-width="8"  stroke-linecap="butt" opacity="0.65"/>
  <!-- Sleep nadir (60-118°): thinnest -->
  <path d="M 715.1,404.0 A 230 230 0 0 1 718.7,612.8" fill="none" stroke="#160C42" stroke-width="6"  stroke-linecap="butt" opacity="0.55"/>
  <!-- Dawn transition (120-148°): ramping up -->
  <path d="M 707.1,633.9 A 230 230 0 0 1 640.6,702.7" fill="none" stroke="#3D2A95" stroke-width="14" stroke-linecap="butt" opacity="0.80"/>
  <!-- Wake building (150-208°): purple, thickening -->
  <path d="M 620.0,715.1 A 230 230 0 0 1 411.2,718.7" fill="none" stroke="#7B61FF" stroke-width="22" stroke-linecap="butt" opacity="0.88"/>
  <!-- Evening peak pressure (210-268°): gold, thickest -->
  <path d="M 390.1,707.1 A 230 230 0 0 1 282.6,528.0" fill="none" stroke="#C8A84B" stroke-width="26" stroke-linecap="butt" opacity="0.90"/>
  <!-- Dusk transition (270-328°): tapering back -->
  <path d="M 282.1,504.0 A 230 230 0 0 1 383.4,321.3" fill="none" stroke="#4A32A0" stroke-width="16" stroke-linecap="butt" opacity="0.82"/>

  <!-- ─────────────────────────────────────────────────────────────
       INNER SPINE MARKS — 12 radial lines (every 30°)
       Length and brightness scale with circadian alertness.
       Midnight (pos0) = shortest, dimmest.
       Noon (pos6) = longest, gold-glowing.
       This is the "clock-face" skeleton that survives monochrome.
       ───────────────────────────────────────────────────────────── -->

  <!-- pos0  0°  midnight → dim, short -->
  <line x1="512.0" y1="404.0" x2="512.0" y2="384.0" stroke="#1E1254" stroke-width="2.5" stroke-linecap="round" opacity="0.70"/>
  <!-- pos1  30° 2am            -->
  <line x1="564.5" y1="421.1" x2="577.0" y2="399.4" stroke="#261866" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>
  <!-- pos2  60° 4am            -->
  <line x1="600.3" y1="461.0" x2="626.3" y2="446.0" stroke="#2D1E78" stroke-width="3.0" stroke-linecap="round" opacity="0.80"/>
  <!-- pos3  90° 6am dawn       -->
  <line x1="612.0" y1="512.0" x2="652.0" y2="512.0" stroke="#4A35B0" stroke-width="3.5" stroke-linecap="round" opacity="0.87"/>
  <!-- pos4  120° 8am rising    -->
  <line x1="596.9" y1="561.0" x2="641.9" y2="587.0" stroke="#6A50D0" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
  <!-- pos5  150° 10am alert    -->
  <line x1="560.0" y1="595.1" x2="591.0" y2="648.8" stroke="#7B61FF" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>
  <!-- pos6  180° noon → longest, gold glow -->
  <line x1="512.0" y1="606.0" x2="512.0" y2="677.0" stroke="#C8A84B" stroke-width="7.0" stroke-linecap="round" opacity="1.00" filter="url(#softGlow)"/>
  <!-- pos7  210° 2pm           -->
  <line x1="464.0" y1="595.1" x2="433.0" y2="648.8" stroke="#B89440" stroke-width="5.5" stroke-linecap="round" opacity="0.95"/>
  <!-- pos8  240° 4pm           -->
  <line x1="427.1" y1="561.0" x2="382.1" y2="587.0" stroke="#9E7FE8" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
  <!-- pos9  270° 6pm evening   -->
  <line x1="412.0" y1="512.0" x2="372.0" y2="512.0" stroke="#7B61FF" stroke-width="3.5" stroke-linecap="round" opacity="0.87"/>
  <!-- pos10 300° 8pm wind-down -->
  <line x1="423.7" y1="461.0" x2="397.7" y2="446.0" stroke="#4A35B0" stroke-width="3.0" stroke-linecap="round" opacity="0.80"/>
  <!-- pos11 330° 10pm          -->
  <line x1="459.5" y1="421.1" x2="447.0" y2="399.4" stroke="#311E82" stroke-width="2.5" stroke-linecap="round" opacity="0.75"/>

  <!-- ─────────────────────────────────────────────────────────────
       TRANSITION GATE MARKS — dawn (6am) and dusk (10pm)
       Precise rhombic markers at the biological gate hours.
       These are the shift worker's critical threshold moments.
       ───────────────────────────────────────────────────────────── -->

  <!-- Dawn gate: 6am = outer ring right pole (832, 512) -->
  <!-- Small rhombus, gold: the moment alertness opens -->
  <polygon points="844,504 852,512 844,520 836,512" fill="#C8A84B" opacity="0.88"/>

  <!-- Dusk gate: 10pm = 22×15=330° on outer ring = (352, 235) approximately -->
  <!-- Small rhombus, purple: the moment sleep window opens -->
  <polygon points="340,226 348,234 340,242 332,234" fill="#7B61FF" opacity="0.82"/>

  <!-- ─────────────────────────────────────────────────────────────
       CORE NODE — The biological clock anchor
       Concentric precision rings converging to the gold disk.
       Outer ring whisper-thin, inner disk solid gold.
       Survives monochrome as a clean bull's-eye.
       ───────────────────────────────────────────────────────────── -->

  <!-- Outer whisper ring -->
  <circle cx="512" cy="512" r="74" fill="none" stroke="#C8A84B" stroke-width="1.5" opacity="0.45"/>
  <!-- Mid precision ring -->
  <circle cx="512" cy="512" r="60" fill="none" stroke="#7B61FF" stroke-width="1.0" opacity="0.40"/>
  <!-- Core fill: deep background -->
  <circle cx="512" cy="512" r="52" fill="#0A0D1A"/>
  <!-- Inner separator ring -->
  <circle cx="512" cy="512" r="42" fill="none" stroke="#231665" stroke-width="1.0" opacity="0.60"/>
  <!-- Gold disk -->
  <circle cx="512" cy="512" r="32" fill="url(#goldCore)"/>
  <!-- Center highlight -->
  <circle cx="504" cy="504" r="10" fill="#F8E4A8" opacity="0.55"/>

</svg>

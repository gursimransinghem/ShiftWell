function StatCard({ label, value, sub, color = COLORS.blue }) {
  return (
    <div style={{ ...cardStyle, textAlign: 'center', flex: 1, minWidth: 140 }}>
      <div style={{ fontSize: 32, fontWeight: 700, color, fontFamily: 'SF Mono, monospace' }}>{value}</div>

    </div>
  );
}

function ProgressRing({ percent, size = 160, stroke = 12, color = COLORS.green }) {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  return (
    <svg width={size} height={size} style={{ display: 'block', margin: '0 auto' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={COLORS.border} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={circ} strokeDashoffset={offset}
        strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}
        style={{ transition: 'stroke-dashoffset 1s ease' }} />
      <text x={size/2} y={size/2 - 8} textAnchor="middle" fill={COLORS.white} fontSize={36} fontWeight={700} fontFamily="SF Mono, monospace">{percent}%</text>
      <text x={size/2} y={size/2 + 18} textAnchor="middle" fill={COLORS.textMuted} fontSize={12}>COMPLETE</text>
    </svg>
  );
}

name: ShiftWell CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run lint
      run: npm run lint || echo "No lint script found"

    - name: Run tests
      run: npm test || echo "No tests found"

    - name: Build check (Expo)
      run: npx expo export || echo "Expo export failed"
